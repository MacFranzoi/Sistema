<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: transparent; }

#wrap { display: flex; flex-direction: column; gap: 10px; }

#counter {
  font-size: 0.85rem; line-height: 1.6; font-weight: 700; color: #fafafa;
  background: #1a2d40; padding: 8px 12px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
}
#counter .sep { margin: 0 6px; opacity: .4; }
#counter #breakdown { font-weight: 600; color: #9fd3ff; }

textarea {
  width: 100%; height: 200px; resize: vertical;
  font-family: ui-monospace, monospace; font-size: 16px; line-height: 1.5;
  padding: 12px 14px; border-radius: 10px;
  background: #0e1117; color: #fafafa;
  border: 2px solid #3a3f55; outline: none;
}
textarea:focus { border-color: #7c3aed; }

.row { display: flex; gap: 10px; }
button {
  flex: 1; padding: 11px 14px; border-radius: 10px; cursor: pointer;
  font-size: 0.9rem; font-weight: 600; border: none; transition: filter .15s;
}
button:active { filter: brightness(1.15); }
button:disabled { opacity: .45; cursor: not-allowed; }
#btn-add   { background: #7c3aed; color: #fff; }
#btn-clear { background: #2a2e42; color: #cfd2e0; }
</style>
</head>
<body>

<div id="wrap">
  <div id="counter">
    <span id="total">0 linha(s)</span>
    <span class="sep">|</span>
    <span id="modelos">0 modelo(s)</span>
    <span class="sep">|</span>
    <span id="breakdown"></span>
  </div>
  <textarea id="ta" autofocus
    placeholder="Clique aqui e comece a bipar...&#10;Cada código aparece em uma linha."></textarea>
  <div class="row">
    <button id="btn-add" disabled>➕ Adicionar tudo à lista</button>
    <button id="btn-clear">🗑️ Limpar</button>
  </div>
</div>

<script>
const ST = {
  ready()     { _post({type:"streamlit:componentReady",apiVersion:1}); },
  send(value) { _post({type:"streamlit:setComponentValue",value,dataType:"json"}); },
  height(h)   { _post({type:"streamlit:setFrameHeight",height:h}); }
};
function _post(msg) {
  window.parent.postMessage(Object.assign({isStreamlitMessage:true}, msg), "*");
}
ST.ready();
ST.height(320);

let NAME_MAP = {};

const ta        = document.getElementById("ta");
const btnAdd    = document.getElementById("btn-add");
const btnClear  = document.getElementById("btn-clear");
const elTotal   = document.getElementById("total");
const elModelos = document.getElementById("modelos");
const elBreak   = document.getElementById("breakdown");

function linhas() {
  return ta.value.split("\n").map(s => s.trim()).filter(s => s !== "");
}

function atualizarContador() {
  const ls = linhas();
  const byModel = {};
  ls.forEach(c => {
    const nm = NAME_MAP[c];
    const key = nm ? nm.split(" / ")[0] : ("❓ " + c);
    byModel[key] = (byModel[key] || 0) + 1;
  });
  const n = Object.keys(byModel).length;
  elTotal.textContent   = ls.length + " linha(s)";
  elModelos.textContent = n + " modelo(s)";
  elBreak.textContent   = Object.entries(byModel)
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(e => e[0] + ": " + e[1]).join("  ·  ");
  btnAdd.disabled = ls.length === 0;
}

ta.addEventListener("input", atualizarContador);

// Recebe o mapa código→nome do Python (uma vez, no render)
window.addEventListener("message", (e) => {
  if (!e.data || e.data.type !== "streamlit:render") return;
  const args = e.data.args || {};
  if (args.name_map) {
    NAME_MAP = args.name_map;
    atualizarContador();
  }
  // Se o Python sinalizar que processou, limpa e devolve o foco pra seguir bipando.
  if (args.processed_ts && args.processed_ts !== ta.dataset.lastProcessed) {
    ta.dataset.lastProcessed = args.processed_ts;
    ta.value = "";
    atualizarContador();
    ta.focus();
  }
});

btnAdd.addEventListener("click", () => {
  const ls = linhas();
  if (ls.length === 0) return;
  ST.send({ codes: ls, ts: Date.now() });
});

btnClear.addEventListener("click", () => {
  ta.value = "";
  atualizarContador();
  ta.focus();
});

// Mantém o foco no textarea para o leitor não "parar de bipar".
ta.focus();
</script>
</body>
</html>
