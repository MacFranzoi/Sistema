<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0e1117; color: #fafafa; }

#tap-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 266px; cursor: pointer; background: #0e1117;
  gap: 12px; user-select: none;
}
#tap-screen .icon { font-size: 52px; }
#tap-screen .label { font-size: 16px; color: #9099aa; }

#cam-screen { display: none; }
#overlay { position: relative; }
video {
  width: 100%; height: 220px; object-fit: cover;
  background: #000; display: block;
}
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 240px; height: 80px;
  border: 2px solid rgba(255,75,75,0.85);
  border-radius: 6px; pointer-events: none;
  box-shadow: 0 0 0 1000px rgba(0,0,0,0.35);
}
/* corner accents */
#crosshair::before,#crosshair::after,
#ch2::before,#ch2::after {
  content:""; position:absolute;
  width:16px; height:16px; border-color:#ff4b4b; border-style:solid;
}
#crosshair::before { top:-2px;   left:-2px;  border-width:3px 0 0 3px; }
#crosshair::after  { bottom:-2px; left:-2px;  border-width:0 0 3px 3px; }
#ch2::before       { top:-2px;   right:-2px; border-width:3px 3px 0 0; }
#ch2::after        { bottom:-2px; right:-2px; border-width:0 3px 3px 0; }
#ch2 {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 240px; height: 80px; pointer-events: none;
}

#status {
  padding: 12px 16px; text-align: center; font-size: 15px;
  background: #1e2130; min-height: 46px;
  transition: background 0.3s, color 0.3s;
  color: #9099aa;
}
#status.analyzing { background: #1a2640; color: #6ea8fe; }
#status.found     { background: #1a4731; color: #4caf50; font-weight: 600; }
#status.error     { background: #2d1f1f; color: #ff6b6b; }
</style>
</head>
<body>

<!-- Initial tap prompt -->
<div id="tap-screen">
  <div class="icon">📷</div>
  <div class="label">Toque para iniciar a câmera</div>
</div>

<!-- Camera view (shown after tap) -->
<div id="cam-screen">
  <div id="overlay">
    <video id="video" muted playsinline webkit-playsinline></video>
    <div id="crosshair"></div>
    <div id="ch2"></div>
  </div>
  <div id="status">📷 Aponte a etiqueta para a câmera...</div>
</div>

<script>
// ── Streamlit protocol ────────────────────────────────────────
const ST = {
  ready()     { _post({type:"streamlit:componentReady",apiVersion:1}); },
  send(value) { _post({type:"streamlit:setComponentValue",value,dataType:"json"}); },
  height(h)   { _post({type:"streamlit:setFrameHeight",height:h}); }
};
function _post(msg) {
  window.parent.postMessage(Object.assign({isStreamlitMessage:true}, msg), "*");
}

ST.ready();
ST.height(278);

// ── Receive state from Python ─────────────────────────────────
window.addEventListener("message", (e) => {
  if (!e.data || e.data.type !== "streamlit:render") return;
  const args = e.data.args || {};
  if (!started) return;
  const s = document.getElementById("status");
  if (args.processing) {
    s.className = "analyzing";
    s.textContent = "⏳ Claude analisando...";
  } else if (args.found) {
    s.className = "found";
    s.textContent = "✅ " + args.found;
    setTimeout(() => { s.className = ""; s.textContent = "📷 Aponte a próxima etiqueta..."; busy = false; }, 1800);
  } else {
    s.className = "";
    s.textContent = "📷 Aponte a etiqueta para a câmera...";
    busy = false;
  }
});

// ── Camera startup (requires user gesture on iOS) ─────────────
const tapScreen = document.getElementById("tap-screen");
const camScreen = document.getElementById("cam-screen");
const video     = document.getElementById("video");
const status    = document.getElementById("status");

let started = false;
let busy    = false;
const INTERVAL = 3000; // ms between captures

tapScreen.addEventListener("click", startCamera);

async function startCamera() {
  tapScreen.style.display = "none";
  camScreen.style.display = "block";
  status.textContent = "Abrindo câmera...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    started = true;
    status.textContent = "📷 Aponte a etiqueta para a câmera...";
    setInterval(captureAndSend, INTERVAL);
  } catch (err) {
    // Retry with minimal constraints
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();
      started = true;
      status.textContent = "📷 Aponte a etiqueta para a câmera...";
      setInterval(captureAndSend, INTERVAL);
    } catch (err2) {
      status.className = "error";
      status.textContent = "Câmera indisponível: " + err2.message;
    }
  }
}

// ── Capture frame and send to Python ─────────────────────────
const canvas = document.createElement("canvas");
const ctx    = canvas.getContext("2d");

function captureAndSend() {
  if (busy || !started || video.readyState < 2 || video.paused || video.ended) return;
  busy = true;

  canvas.width  = Math.min(video.videoWidth, 800);
  canvas.height = Math.round(canvas.width * video.videoHeight / video.videoWidth);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const dataUrl = canvas.toDataURL("image/jpeg", 0.75);
  status.className = "analyzing";
  status.textContent = "⏳ Claude analisando...";
  ST.send({ frame: dataUrl, ts: Date.now() });
}
</script>
</body>
</html>
