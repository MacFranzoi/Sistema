<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0e1117; color: #fafafa; }

#tap-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 266px; cursor: pointer; background: #0e1117; gap: 12px; user-select: none;
}
#tap-screen .icon  { font-size: 52px; }
#tap-screen .label { font-size: 16px; color: #9099aa; }

#cam-screen { display: none; }
#interactive { position: relative; width: 100%; height: 220px; overflow: hidden; background: #000; }
#interactive video,
#interactive canvas.drawingBuffer {
  position: absolute; top: 0; left: 0;
  width: 100% !important; height: 220px !important;
  object-fit: cover !important;
}
#interactive canvas.drawingBuffer { opacity: 0; }

#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 240px; height: 80px;
  border: 2px solid rgba(255,75,75,0.85);
  border-radius: 6px; pointer-events: none;
  box-shadow: 0 0 0 1000px rgba(0,0,0,0.35);
  z-index: 10;
}

#status {
  padding: 12px 16px; text-align: center; font-size: 15px;
  background: #1e2130; min-height: 46px; color: #9099aa;
  transition: background 0.25s, color 0.25s;
}
#status.found { background: #1a4731; color: #4caf50; font-weight: 600; font-size: 17px; }
#status.error { background: #2d1f1f; color: #ff6b6b; }
</style>
</head>
<body>

<div id="tap-screen">
  <div class="icon">📷</div>
  <div class="label">Toque para iniciar o scanner</div>
</div>

<div id="cam-screen">
  <div id="interactive">
    <div id="crosshair"></div>
  </div>
  <div id="status">Iniciando câmera...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.4.0/dist/quagga.min.js"></script>
<script>
// ── Streamlit protocol ────────────────────────────────────────
const ST = {
  ready()     { _post({type:"streamlit:componentReady",apiVersion:1}); },
  send(value) { _post({type:"streamlit:setComponentValue",value,dataType:"json"}); },
  height(h)   { _post({type:"streamlit:setFrameHeight",height:h}); }
};
function _post(msg) {
  window.parent.postMessage(Object.assign({isStreamlitMessage:true}, msg), "*");
}
ST.ready();
ST.height(278);

const tapScreen = document.getElementById("tap-screen");
const camScreen = document.getElementById("cam-screen");
const status    = document.getElementById("status");

let lastCode = null, lastSentAt = 0;
const COOLDOWN = 2500;

tapScreen.addEventListener("click", () => {
  tapScreen.style.display = "none";
  camScreen.style.display = "block";
  startQuagga();
});

function startQuagga() {
  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.getElementById("interactive"),
      constraints: { facingMode: "environment" },
    },
    locator:    { patchSize: "medium", halfSample: true },
    numOfWorkers: 0,   // 0 = main thread (required for iOS)
    frequency:  8,
    decoder: {
      readers: [
        "ean_reader", "ean_8_reader",
        "code_128_reader", "code_39_reader",
        "upc_reader", "upc_e_reader",
      ],
    },
    locate: true,
  }, (err) => {
    if (err) {
      status.className   = "error";
      status.textContent = "Câmera indisponível: " + (err.message || err);
      return;
    }
    Quagga.start();
    status.textContent = "📷 Aponte o código de barras...";
  });

  Quagga.onDetected((result) => {
    const code = result.codeResult.code;
    if (!code) return;

    // Filter false positives by average decode error
    const errs = (result.codeResult.decodedCodes || [])
      .map(x => x.error).filter(e => e != null);
    const avg = errs.length ? errs.reduce((a, b) => a + b, 0) / errs.length : 1;
    if (avg > 0.22) return;

    const now = Date.now();
    if (code === lastCode && now - lastSentAt < COOLDOWN) return;
    lastCode   = code;
    lastSentAt = now;

    status.className   = "found";
    status.textContent = "✅ " + code;
    ST.send({ code, ts: now });

    setTimeout(() => {
      if (lastCode === code) {
        status.className   = "";
        status.textContent = "📷 Aponte o próximo código...";
        lastCode = null;
      }
    }, 1800);
  });
}
</script>
</body>
</html>
