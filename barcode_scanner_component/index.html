<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 0; font-family: sans-serif; background: #0e1117; color: #fafafa; }
#reader { width: 100%; overflow: hidden; }
#reader video { width: 100% !important; height: 220px !important; object-fit: cover !important; border-radius: 0 !important; display: block !important; }
#reader img { display: none !important; }
#status {
  padding: 12px 16px; text-align: center; font-size: 15px;
  background: #1e2130; min-height: 46px; transition: background 0.25s, color 0.25s;
}
#status.found { background: #1a4731; color: #4caf50; font-weight: 600; font-size: 17px; }
#status.error { background: #2d1f1f; color: #ff6b6b; }
/* hide html5-qrcode default dashboard */
#reader__dashboard_section,
#reader__header_message,
#reader__status_span,
#reader__filescan_input { display: none !important; }
</style>
</head>
<body>
<div id="reader"></div>
<div id="status">📷 Aponte o código de barras para a câmera...</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
// ── Streamlit component protocol ────────────────────────────
const ST = {
  ready()      { _post({type:"streamlit:componentReady",apiVersion:1}); },
  send(value)  { _post({type:"streamlit:setComponentValue",value,dataType:"json"}); },
  height(h)    { _post({type:"streamlit:setFrameHeight",height:h}); }
};
function _post(msg) {
  window.parent.postMessage(Object.assign({isStreamlitMessage:true}, msg), "*");
}

ST.ready();
ST.height(278);

// ── Scanner ──────────────────────────────────────────────────
const status = document.getElementById("status");
let lastCode = null, lastSentAt = 0;
const COOLDOWN = 2000;

const scanner = new Html5Qrcode("reader");
scanner.start(
  { facingMode: { ideal: "environment" } },
  {
    fps: 10,
    qrbox: { width: 220, height: 80 },
    formatsToSupport: [
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.QR_CODE,
    ]
  },
  (code) => {
    const now = Date.now();
    if (code === lastCode && now - lastSentAt < COOLDOWN) return;
    lastCode = code;
    lastSentAt = now;

    status.className   = "found";
    status.textContent = "✓ " + code;
    ST.send(code);

    setTimeout(() => {
      if (lastCode === code) {
        status.className   = "";
        status.textContent = "📷 Aponte para o próximo código...";
        lastCode = null;
      }
    }, 1500);
  },
  () => {} // ignore per-frame decode errors
).catch(err => {
  status.className   = "error";
  status.textContent = "Câmera não disponível: " + err;
});
</script>
</body>
</html>
