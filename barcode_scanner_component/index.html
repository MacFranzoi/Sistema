<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0e1117; color: #fafafa; }

#tap-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 266px; cursor: pointer; background: #0e1117; gap: 12px; user-select: none;
}
#tap-screen .icon  { font-size: 52px; }
#tap-screen .label { font-size: 16px; color: #9099aa; }
#tap-screen .hint  { font-size: 13px; color: #555; }

#cam-screen { display: none; }
#overlay { position: relative; width: 100%; height: 220px; overflow: hidden; background: #000; }
video {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 220px; object-fit: cover; display: block;
}
canvas { display: none; }
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 260px; height: 90px;
  border: 2px solid rgba(255, 75, 75, 0.9);
  border-radius: 6px; pointer-events: none;
  box-shadow: 0 0 0 1000px rgba(0,0,0,0.4);
  z-index: 10;
}
#btn-capture {
  position: absolute; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.55);
  color: #fff; font-size: 14px; font-weight: 600;
  padding: 8px 22px; border-radius: 24px;
  backdrop-filter: blur(6px);
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
#btn-capture:active { background: rgba(255,255,255,0.35); }

#status {
  padding: 12px 16px; text-align: center; font-size: 15px;
  background: #1e2130; min-height: 46px; color: #9099aa;
  transition: background 0.3s, color 0.3s;
}
#status.scanning  { color: #9099aa; }
#status.sending   { background: #1a2640; color: #6ea8fe; }
#status.found     { background: #1a4731; color: #4caf50; font-weight: 600; font-size: 17px; }
#status.notfound  { background: #2d2010; color: #f0a040; }
#status.error     { background: #2d1f1f; color: #ff6b6b; }
</style>
</head>
<body>

<div id="tap-screen">
  <div class="icon">📷</div>
  <div class="label">Toque para iniciar o scanner</div>
  <div class="hint">Aponte para o código de barras da etiqueta</div>
</div>

<div id="cam-screen">
  <div id="overlay">
    <video id="video" muted playsinline webkit-playsinline autoplay></video>
    <canvas id="canvas"></canvas>
    <div id="crosshair"></div>
    <button id="btn-capture">Ler agora</button>
  </div>
  <div id="status" class="scanning">📷 Aponte o código de barras para a câmera...</div>
</div>

<script>
const ST = {
  ready()     { _post({type:"streamlit:componentReady",apiVersion:1}); },
  send(value) { _post({type:"streamlit:setComponentValue",value,dataType:"json"}); },
  height(h)   { _post({type:"streamlit:setFrameHeight",height:h}); }
};
function _post(msg) {
  window.parent.postMessage(Object.assign({isStreamlitMessage:true}, msg), "*");
}
ST.ready();
ST.height(278);

const tapScreen = document.getElementById("tap-screen");
const camScreen = document.getElementById("cam-screen");
const video     = document.getElementById("video");
const canvas    = document.getElementById("canvas");
const ctx       = canvas.getContext("2d");
const status    = document.getElementById("status");

let busy = false;
let _busyTimer = null;
function setBusy(v) {
  busy = v;
  clearTimeout(_busyTimer);
  if (v) _busyTimer = setTimeout(() => { busy = false; }, 8000);
}

function playBeep(ok) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (ok) {
      // leitura ok: dois bipes curtos e suaves (sol + si)
      osc.type = "sine";
      osc.frequency.setValueAtTime(784, ctx.currentTime);          // G5
      osc.frequency.setValueAtTime(988, ctx.currentTime + 0.08);  // B5
      gain.gain.setValueAtTime(0.22, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.18);
    } else {
      // não encontrado: bipe grave curto
      osc.type = "sine";
      osc.frequency.value = 330;  // E4
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    }
  } catch(_) {}
}

// Recebe resposta do Python (nome do produto ou não encontrado)
window.addEventListener("message", (e) => {
  if (!e.data || e.data.type !== "streamlit:render") return;
  const args = e.data.args || {};
  if (args.product_name) {
    playBeep(true);
    status.className   = "found";
    status.textContent = "✅ " + args.product_name;
    setTimeout(resetStatus, 2500);
  } else if (args.not_found) {
    if (args.not_found !== "frame") playBeep(false);
    status.className   = "notfound";
    status.textContent = args.not_found === "frame"
      ? "⚠️ Não detectado — ajuste e tente novamente"
      : "⚠️ Código não cadastrado: " + args.not_found;
    setTimeout(resetStatus, 2200);
  }
  setBusy(false);
});

function resetStatus() {
  status.className   = "scanning";
  status.textContent = "📷 Aponte o código de barras para a câmera...";
}

document.getElementById("btn-capture").addEventListener("click", () => {
  setBusy(false);   // força captura mesmo que ainda esteja no cooldown
  capture();
});

function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }
  }).then(stream => {
    video.srcObject = stream;
    video.play().catch(() => {});
    setInterval(capture, 2000);
  }).catch(err => {
    status.className   = "error";
    status.textContent = "Câmera: " + err.message;
  });
}

function capture() {
  if (busy || video.readyState < 2 || video.paused) return;
  setBusy(true);

  const vw = video.videoWidth  || 640;
  const vh = video.videoHeight || 480;

  // Captura a faixa central (onde fica o crosshair) — melhora detecção
  const margin = 0.12;  // 12% das bordas
  const sx = Math.floor(vw * margin);
  const sy = Math.floor(vh * 0.25);
  const sw = Math.floor(vw * (1 - margin * 2));
  const sh = Math.floor(vh * 0.50);

  canvas.width  = sw;
  canvas.height = sh;
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

  const frame = canvas.toDataURL("image/jpeg", 0.92);
  status.className   = "sending";
  status.textContent = "🔍 Lendo código...";
  ST.send({ frame, ts: Date.now() });
}

// Persiste estado entre reruns do Streamlit via sessionStorage
// Também limpa quando o usuário saiu e voltou (iframe destruído e recriado)
if (sessionStorage.getItem("sc_started") === "1") {
  tapScreen.style.display = "none";
  camScreen.style.display = "block";
  startCamera();
} else {
  tapScreen.addEventListener("click", () => {
    sessionStorage.setItem("sc_started", "1");
    tapScreen.style.display = "none";
    camScreen.style.display = "block";
    startCamera();
  }, { once: true });
}

// Limpa sessionStorage quando o iframe é fechado (troca de modo)
window.addEventListener("unload", () => {
  sessionStorage.removeItem("sc_started");
});
</script>
</body>
</html>
