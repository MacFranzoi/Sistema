<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#18181b" />
  <title>Plug ERP 2.0</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Tela de login -->
  <div id="login" class="login hidden">
    <form id="login-form" class="login-card">
      <div class="login-logo">⚡</div>
      <div class="login-title">Plug ERP</div>
      <div class="login-sub">Sistema 2.0</div>
      <input id="login-user" type="text" placeholder="Usuário" autocomplete="username" />
      <input id="login-pass" type="password" placeholder="Senha" autocomplete="current-password" />
      <button type="submit">Entrar</button>
      <div id="login-erro" class="login-erro"></div>
    </form>
  </div>

  <!-- App (nav fixo + conteúdo) -->
  <div id="app" class="app hidden">
    <!-- Topo: logo + categorias -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">⚡</span>
        <span class="brand-name">Plug</span>
      </div>
      <nav id="cats" class="cats"></nav>
      <div class="topbar-right">
        <select id="loja-sel" class="loja-sel" title="Loja"></select>
        <button id="btn-sair" class="btn-sair" title="Sair">Sair</button>
      </div>
    </header>

    <!-- Submenu da categoria ativa -->
    <nav id="submenu" class="submenu"></nav>

    <!-- Área de conteúdo (só isto muda ao navegar — cara de app) -->
    <main id="conteudo" class="conteudo">
      <div class="loading">Carregando…</div>
    </main>

    <!-- Barra inferior (mobile) -->
    <nav id="tabbar" class="tabbar"></nav>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
